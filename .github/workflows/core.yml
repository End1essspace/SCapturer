name: core

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"

jobs:
  build-and-test:
    name: Build and logic tests
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore .\SCapturer.sln

      - name: Build
        run: dotnet build .\SCapturer.sln -c Release --no-restore

      - name: Run logic tests
        run: dotnet run --project .\tests\SCapturer.Tests\SCapturer.Tests.csproj -c Release --no-build
